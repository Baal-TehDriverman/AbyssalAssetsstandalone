name: Build Abyssal Assets Android APK

on:
  push:
    branches: [master, main]
    paths:
      - 'client/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'client/**'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  NODE_VERSION: '24'
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.5'

jobs:
  build-android:
    name: Build Android APK/AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

    steps:
      # ============ CHECKOUT ============
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ============ SETUP NODE ============
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # ============ SETUP JAVA ============
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          java-package: jdk

      # ============ SETUP ANDROID SDK ============
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk-version: r26b
          build-tools-version: 34.0.0
          cmake-version: 3.22.1

      # ============ INSTALL DEPENDENCIES ============
      - name: Install dependencies
        working-directory: ./client
        run: |
          npm install --legacy-peer-deps

      # ============ BUILD WEB APP ============
      - name: Build web app
        working-directory: ./client
        run: |
          npm run build
        env:
          VITE_API_URL: http://192.168.1.153:8000/api
          VITE_WS_URL: ws://192.168.1.153:8000/ws

      # ============ CAPACITOR SYNC ============
      - name: Capacitor add android platform
        working-directory: ./client
        run: |
          npx cap add android || true

      - name: Capacitor sync
        working-directory: ./client
        run: |
          npx cap sync android

      # ============ BUILD ANDROID ============
      - name: Build Android APK
        working-directory: ./client/android
        run: |
          chmod +x gradlew
          ./gradlew assemble${{ github.event.inputs.build_type || 'Release' }}
        env:
          GRADLE_OPTS: '-Xmx4g -Dorg.gradle.jvmargs="-Xmx4g" -Dorg.gradle.parallel=true -Dorg.gradle.configureondemand=true'

      # ============ UPLOAD ARTIFACTS ============
      - name: Upload Debug APK
        if: github.event.inputs.build_type == 'debug' || github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: abyssal-assets-debug-apk
          path: client/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release' || github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: abyssal-assets-release-apk
          path: client/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Release AAB (for Play Store)
        if: github.event.inputs.build_type == 'release' || github.event_name != 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: abyssal-assets-release-aab
          path: client/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      # ============ CREATE RELEASE ============
      - name: Create Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            client/android/app/build/outputs/apk/release/*.apk
            client/android/app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============ PWA BUILD ============
  build-pwa:
    name: Build PWA (Web)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      # ============ INSTALL DEPENDENCIES ============
      - name: Install dependencies
        working-directory: ./client
        run: |
          npm install --legacy-peer-deps

      - name: Build PWA
        working-directory: ./client
        run: npm run build

      - name: Upload PWA build
        uses: actions/upload-artifact@v4
        with:
          name: abyssal-assets-pwa
          path: client/dist/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./client/dist
          force_orphan: true